  ink: "#101826", inkDim: "#5B6472",

const GOOGLE_CLIENT_ID = "521828227436-s3qcdgb7ivd9aaaqifm1c20nat8ntcj1.apps.googleusercontent.com";

const EVIDENCE_STYLES = {
  Alto: { color: TOKENS.alto, label: "Evidencia alta" },
  Medio: { color: TOKENS.medio, label: "Evidencia media" },
  Especulativo: { color: TOKENS.especulativo, label: "Especulativo" },
};

const CATEGORY_ICONS = {
  "Aumento de Energía Diaria": "⚡",
  "Balance Hormonal y Estrés": "🌿",
  "Salud Digestiva y Antinflamación": "🌾",
  "Longevidad y Antienvejecimiento": "⏳",

  "Piel y Cabello": "✨",

function CategoryIcon({ name }) {
  const icon = CATEGORY_ICONS[name] || "•";
  return (
    <span style={{
      width: 36, height: 36, borderRadius: 8, background: TOKENS.primarySoft,
      display: "inline-flex", alignItems: "center", justifyContent: "center",
      fontSize: 17, flexShrink: 0,
    }}>{icon}</span>
  );
}

function EvidenceStamp({ level }) {
  if (!level) return null;
  const style = EVIDENCE_STYLES[level] || { color: TOKENS.inkDim, label: level };
  return (
    <div style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      background: style.color + "14", borderRadius: 999,
      padding: "4px 10px 4px 8px", whiteSpace: "nowrap",
    }}>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: style.color, flexShrink: 0 }} />
      <span style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: "10.5px",
        letterSpacing: "0.03em", color: style.color, fontWeight: 500,
      }}>{style.label}</span>
    </div>
  );
}

function EvidenceSummaryBar({ entradas }) {
  const total = entradas.length;
  if (!total) return null;
  const counts = { Alto: 0, Medio: 0, Especulativo: 0 };
  entradas.forEach((e) => {
    if (counts[e.evidencia] !== undefined) counts[e.evidencia] += 1;
  });
  const segments = [
    { key: "Alto", color: TOKENS.alto, count: counts.Alto },
    { key: "Medio", color: TOKENS.medio, count: counts.Medio },
    { key: "Especulativo", color: TOKENS.especulativo, count: counts.Especulativo },
  ];
  const sinClasificar = total - counts.Alto - counts.Medio - counts.Especulativo;

  return (
    <div style={{ marginBottom: 22, background: TOKENS.surface, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: 16 }}>
      <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10.5, color: TOKENS.inkDim, letterSpacing: "0.05em", textTransform: "uppercase", marginTop: 0, marginBottom: 10 }}>
        Solidez del contenido cargado ({total} entradas)
      </p>
      <div style={{ display: "flex", width: "100%", height: 8, borderRadius: 999, overflow: "hidden", background: TOKENS.border, marginBottom: 10 }}>
        {segments.map((s) => s.count > 0 && (
          <div key={s.key} style={{ width: `${(s.count / total) * 100}%`, background: s.color }} />
        ))}
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: "6px 16px" }}>
        {segments.map((s) => (
          <div key={s.key} style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ width: 7, height: 7, borderRadius: "50%", background: s.color }} />
            <span style={{ fontSize: 12, color: TOKENS.inkDim }}>{s.key} · {s.count}</span>
          </div>
        ))}
        {sinClasificar > 0 && (
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ width: 7, height: 7, borderRadius: "50%", background: TOKENS.border, border: `1px solid ${TOKENS.borderStrong}` }} />
            <span style={{ fontSize: 12, color: TOKENS.inkDim }}>Sin clasificar · {sinClasificar}</span>
          </div>
        )}
      </div>
    </div>
  );
}

function groupByCategoria(entradas) {
  const grupos = {};
  entradas.forEach((e) => {
    let claves = e.categorias && e.categorias.length ? e.categorias : null;
    if (!claves) {
      claves = [e.tipo === "protocolo" ? "Hábitos y Rutinas" : "Sin categorizar (pendiente)"];
    }
    claves.forEach((cat) => {
      if (!grupos[cat]) grupos[cat] = [];
      grupos[cat].push(e);
    });
  });
  return grupos;
}

function LogMealScreen({ onBack, usuarioId }) {
  const [texto, setTexto] = useState("");
  const [momento, setMomento] = useState("");
  const [enviando, setEnviando] = useState(false);
  const [resultado, setResultado] = useState(null);
  const [error, setError] = useState(null);

  const enviar = async () => {
    if (!texto.trim()) return;
    setEnviando(true);
    setError(null);
    try {
      const resp = await fetch("/api/registrar-comida", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto, momento: momento || undefined, usuarioId }),
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      setResultado(data);
    } catch (e) {
      setError(String(e.message || e));
    } finally {
      setEnviando(false);
    }
  };

  if (resultado) {
    const resueltos = resultado.resueltos || [];
    const sugerencias = resultado.sugerencias || [];
    return (
      <div className="fade-in">
        <button onClick={onBack} style={{ background: "none", border: "none", color: TOKENS.inkDim, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 13, marginBottom: 20, cursor: "pointer", padding: 0 }}>
          ← Categorías
        </button>
        <h2 style={{ fontFamily: "'Libre Franklin', sans-serif", fontWeight: 700, fontSize: 21, color: TOKENS.ink, marginBottom: 16, letterSpacing: "-0.01em" }}>
          {resultado.bloqueos.length > 0
            ? `${resultado.bloqueos.length} bloqueo${resultado.bloqueos.length > 1 ? "s" : ""} detectado${resultado.bloqueos.length > 1 ? "s" : ""}`
            : resueltos.length > 0
            ? "Buena elección"
            : "Sin bloqueos detectados"}
        </h2>
        {resultado.bloqueos.length === 0 && resueltos.length === 0 && sugerencias.length === 0 && (
          <p style={{ color: TOKENS.inkDim, fontSize: 14, lineHeight: 1.6 }}>No encontramos combinaciones conflictivas conocidas en lo que registraste. Igual quedó guardado en tu historial.</p>
        )}
        {resueltos.length > 0 && (
          <div style={{ display: "grid", gap: 12, marginBottom: resultado.bloqueos.length ? 16 : 0 }}>
            {resueltos.map((r, i) => (
              <div key={"resuelto-" + i} style={{ background: TOKENS.alto + "0D", border: `1px solid ${TOKENS.alto}55`, borderRadius: 8, padding: 18 }}>
                <p style={{ color: TOKENS.alto, fontSize: 12, fontWeight: 700, letterSpacing: "0.03em", textTransform: "uppercase", marginBottom: 6 }}>✓ Hackeo ya aplicado</p>
                <p style={{ color: TOKENS.ink, fontSize: 14, fontWeight: 600, marginBottom: 6 }}>{r.combinacion}</p>
                <p style={{ color: TOKENS.inkDim, fontSize: 13, lineHeight: 1.6 }}>{r.mensaje}</p>
              </div>
            ))}
          </div>
        )}
        <div style={{ display: "grid", gap: 12 }}>
          {resultado.bloqueos.map((b, i) => (
            <div key={i} style={{ background: TOKENS.surface, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: 18 }}>
              <p style={{ color: TOKENS.ink, fontSize: 15, fontWeight: 600, marginBottom: 8 }}>{b.combinacion}</p>
              <p style={{ color: TOKENS.inkDim, fontSize: 13, lineHeight: 1.6, marginBottom: b.solucion ? 12 : 0 }}>{b.resultado}</p>
              {b.solucion && (
                <div style={{ borderTop: `1px solid ${TOKENS.border}`, paddingTop: 12 }}>
                  <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: TOKENS.primary, marginBottom: 4, letterSpacing: "0.05em", textTransform: "uppercase" }}>Solución</p>
                  <p style={{ color: TOKENS.ink, fontSize: 13, lineHeight: 1.6 }}>{b.solucion.adaptacion}</p>
                </div>
              )}
            </div>
          ))}
        </div>
        {sugerencias.length > 0 && (
          <div style={{ display: "grid", gap: 12, marginTop: resultado.bloqueos.length ? 16 : 0 }}>
            {sugerencias.map((s, i) => (
              <div key={"sugerencia-" + i} style={{ background: TOKENS.primarySoft, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: 18 }}>
                <p style={{ color: TOKENS.primary, fontSize: 12, fontWeight: 700, letterSpacing: "0.03em", textTransform: "uppercase", marginBottom: 6 }}>💡 Tip relacionado</p>
                <p style={{ color: TOKENS.ink, fontSize: 14, fontWeight: 600, marginBottom: 6 }}>{s.nombre}</p>
                <p style={{ color: TOKENS.inkDim, fontSize: 13, lineHeight: 1.6 }}>{s.mecanismo}</p>
              </div>
            ))}
          </div>
        )}
        <button onClick={() => { setResultado(null); setTexto(""); setMomento(""); }}
          style={{ marginTop: 20, width: "100%", background: TOKENS.primary, border: "none", borderRadius: 8, padding: "13px", color: "#FFFFFF", fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
          Registrar otra comida
        </button>
      </div>
    );
  }

  return (
    <div className="fade-in">
      <button onClick={onBack} style={{ background: "none", border: "none", color: TOKENS.inkDim, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 13, marginBottom: 20, cursor: "pointer", padding: 0 }}>
        ← Categorías
      </button>
      <h2 style={{ fontFamily: "'Libre Franklin', sans-serif", fontWeight: 700, fontSize: 23, color: TOKENS.ink, marginBottom: 8, letterSpacing: "-0.01em" }}>
        Cargar comida
      </h2>
      <p style={{ color: TOKENS.inkDim, fontSize: 13, marginBottom: 20, lineHeight: 1.5 }}>
        Contanos qué comiste, en tus palabras. Buscamos combinaciones conocidas automáticamente.
      </p>
      <textarea
        value={texto}
        onChange={(e) => setTexto(e.target.value)}
        placeholder="Ej: fideos con salsa de carne y queso rallado"
        rows={4}
        style={{ width: "100%", background: TOKENS.surface, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: 14, color: TOKENS.ink, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 14, marginBottom: 14, resize: "vertical" }}
      />
      <select
        value={momento}
        onChange={(e) => setMomento(e.target.value)}
        style={{ width: "100%", background: TOKENS.surface, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: 12, color: TOKENS.ink, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 14, marginBottom: 16 }}
      >
        <option value="">Momento del día (opcional)</option>
        <option value="Desayuno">Desayuno</option>
        <option value="Almuerzo">Almuerzo</option>
        <option value="Cena">Cena</option>
        <option value="Snack">Snack</option>
      </select>
      {error && <p style={{ color: "#B3453D", fontSize: 13, marginBottom: 12 }}>{error}</p>}
      <button onClick={enviar} disabled={enviando || !texto.trim()}
        style={{ width: "100%", background: enviando || !texto.trim() ? TOKENS.borderStrong : TOKENS.primary, border: "none", borderRadius: 8, padding: "13px", color: "#FFFFFF", fontWeight: 600, fontSize: 14, cursor: enviando ? "default" : "pointer" }}>
        {enviando ? "Buscando bloqueos..." : "Registrar comida"}
      </button>
    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [cargando, setCargando] = useState(false);
  const [error, setError] = useState(null);

  async function handleCredentialResponse(response) {
    setCargando(true);
    setError(null);
    try {
      const resp = await fetch("/api/login-google", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ credential: response.credential }),
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      localStorage.setItem("reseteo_usuario", JSON.stringify(data));
      onLogin(data);
    } catch (e) {
      setError(String(e.message || e));
      setCargando(false);
    }
  }

  useEffect(() => {
    let cancelado = false;
    function intentarRenderizar() {
      if (cancelado) return;
      if (!window.google || !window.google.accounts || !window.google.accounts.id) {
        setTimeout(intentarRenderizar, 200);
        return;
      }
      window.google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse,
      });
      window.google.accounts.id.renderButton(
        document.getElementById("google-signin-button"),
        { theme: "outline", size: "large", width: 280, text: "signin_with" }
      );
    }
    intentarRenderizar();
    return () => { cancelado = true; };
  }, []);

  return (
    <div style={{ minHeight: "100vh", background: TOKENS.bg, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ maxWidth: 340, textAlign: "center" }}>
        <h1 style={{ fontFamily: "'Libre Franklin', sans-serif", fontWeight: 800, fontSize: 26, color: TOKENS.ink, marginBottom: 10, letterSpacing: "-0.02em" }}>
          Reseteo Propio
        </h1>
        <p style={{ color: TOKENS.inkDim, fontSize: 13.5, marginBottom: 28, lineHeight: 1.5 }}>
          Te mostramos el mapa. El camino, lo elegís vos.
        </p>
        <div id="google-signin-button" style={{ display: "flex", justifyContent: "center" }}></div>
        {cargando && <p style={{ color: TOKENS.inkDim, fontSize: 13, marginTop: 16 }}>Ingresando...</p>}
        {error && <p style={{ color: "#B3453D", fontSize: 13, marginTop: 16 }}>{error}</p>}
      </div>
    </div>
  );
}

      <EscalaBienestar etiqueta="Ánimo" valor={animo} onChange={setAnimo} />
      <EscalaBienestar etiqueta="Sueño" valor={sueno} onChange={setSueno} />
      <EscalaBienestar etiqueta="Digestión" valor={digestion} onChange={setDigestion} />

      <button
        onClick={enviar}
        disabled={!completo || enviando}
        style={{
          width: "100%",
          padding: "14px 0",
          borderRadius: 8,
          border: "none",
          background: completo ? TOKENS.primary : TOKENS.border,
          color: "#FFFFFF",
          fontWeight: 700,
          fontSize: 14,
          cursor: completo ? "pointer" : "not-allowed",
          marginTop: 8,
        }}
      >
        {enviando ? "Guardando..." : "Guardar registro"}
      </button>

      {resultado && <p style={{ color: "#0a7d2c", fontSize: 13, marginTop: 14 }}>{resultado}</p>}
      {error && <p style={{ color: "#B3453D", fontSize: 13, marginTop: 14 }}>{error}</p>}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  componentDidCatch(error, info) {
    console.error("Error atrapado por ErrorBoundary:", error, info);
  }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: 24, fontFamily: "'IBM Plex Sans', sans-serif" }}>
          <p style={{ color: "#B3453D", fontWeight: 700, fontSize: 15, marginBottom: 10 }}>Error real en la app:</p>
          <pre style={{ whiteSpace: "pre-wrap", wordBreak: "break-word", fontSize: 12, color: "#101826", background: "#FFFFFF", border: "1px solid #E2E6EB", borderRadius: 8, padding: 14, lineHeight: 1.5 }}>
            {String((this.state.error && (this.state.error.stack || this.state.error.message)) || this.state.error)}
          </pre>
          <p style={{ fontSize: 12, color: "#5B6472", marginTop: 12 }}>Mandale este texto completo a Claude para resolverlo.</p>
        </div>
      );
    }
    return this.props.children;
  }
}

function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [view, setView] = useState({ screen: "categories" });
  const [query, setQuery] = useState("");
  const [usuario, setUsuario] = useState(() => {
    try {
      const guardado = localStorage.getItem("reseteo_usuario");
      return guardado ? JSON.parse(guardado) : null;
    } catch (e) {
      return null;
    }
  });

  useEffect(() => {
    fetch("/api/data")
      .then((r) => r.json())
      .then((json) => {
        if (json.error) { setError(json.error); return; }
        setData(json);
      })
      .catch((e) => setError(String(e)));
  }, []);

  if (error) {
    return (
      <div style={{ padding: 24, color: TOKENS.ink, fontFamily: "'IBM Plex Sans', sans-serif" }}>
        <p style={{ color: "#B3453D" }}>Error cargando datos: {error}</p>
        <p style={{ color: TOKENS.inkDim, fontSize: 13 }}>
          Revisá que la variable de entorno AIRTABLE_API_KEY esté configurada en Vercel.
        </p>
      </div>
    );
  }

  if (!data) {
    return <div style={{ padding: 24, color: TOKENS.inkDim, fontFamily: "'IBM Plex Sans', sans-serif" }}>Cargando...</div>;
  }

  if (!usuario) {
    return <LoginScreen onLogin={setUsuario} />;
  }

  const grupos = groupByCategoria(data.entradas);
  const categorias = Object.keys(grupos).sort();

  const filteredCats = categorias
    .map((cat) => ({
      name: cat,
      entries: grupos[cat].filter((e) => e.combinacion.toLowerCase().includes(query.toLowerCase())),
    }))
    .filter((c) => query === "" || c.entries.length > 0);

  return (
    <div style={{ minHeight: "100vh", background: TOKENS.bg }}>
      <div style={{ maxWidth: 640, margin: "0 auto", padding: "28px 20px 60px" }}>
        <header style={{ marginBottom: 24, display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
          <div>
            <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: TOKENS.primary, letterSpacing: "0.08em", marginBottom: 6, textTransform: "uppercase" }}>
              Comida real · Dato verificable · Sincronizado {new Date(data.actualizado).toLocaleString("es-AR")}
            </p>
            <h1 style={{ fontFamily: "'Libre Franklin', sans-serif", fontWeight: 800, fontSize: 28, color: TOKENS.ink, lineHeight: 1.15, letterSpacing: "-0.02em", margin: 0 }}>
              Explorador por problemática
            </h1>
          </div>
          {view.screen === "categories" && (
            <button onClick={() => setView({ screen: "log" })}
              style={{ background: TOKENS.primary, border: "none", borderRadius: 8, padding: "10px 14px", color: "#FFFFFF", fontWeight: 600, fontSize: 12, whiteSpace: "nowrap", cursor: "pointer", flexShrink: 0 }}>
              + Cargar comida
            </button>
          )}
        </header>

        <nav style={{ display: "flex", gap: 20, marginBottom: 24, borderBottom: `1px solid ${TOKENS.border}` }}>
          <button onClick={() => setView({ screen: "categories" })}
            style={{
              background: "none", border: "none", cursor: "pointer", padding: "0 0 10px 0",
              fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, letterSpacing: "0.04em", fontWeight: 600,
              color: (view.screen === "categories" || view.screen === "category" || view.screen === "entry" || view.screen === "log") ? TOKENS.ink : TOKENS.inkDim,
              borderBottom: (view.screen === "categories" || view.screen === "category" || view.screen === "entry" || view.screen === "log") ? `2px solid ${TOKENS.primary}` : "2px solid transparent",
              marginBottom: -1,
            }}>
            EXPLORADOR
          </button>
          <button onClick={() => setView({ screen: "quien-soy" })}
            style={{
              background: "none", border: "none", cursor: "pointer", padding: "0 0 10px 0",
              fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, letterSpacing: "0.04em", fontWeight: 600,
              color: view.screen === "quien-soy" ? TOKENS.ink : TOKENS.inkDim,
              borderBottom: view.screen === "quien-soy" ? `2px solid ${TOKENS.primary}` : "2px solid transparent",
              marginBottom: -1,
            }}>
            QUIÉN SOY
          </button>
          <button onClick={() => setView({ screen: "bienestar" })}
            style={{
              background: "none", border: "none", cursor: "pointer", padding: "0 0 10px 0",
              fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, letterSpacing: "0.04em", fontWeight: 600,
              color: view.screen === "bienestar" ? TOKENS.ink : TOKENS.inkDim,
              borderBottom: view.screen === "bienestar" ? `2px solid ${TOKENS.primary}` : "2px solid transparent",
              marginBottom: -1,
            }}>
            BIENESTAR
          </button>
        </nav>

        {view.screen === "quien-soy" && (
          <QuienSoyScreen onBack={() => setView({ screen: "categories" })} />
        )}

        {view.screen === "bienestar" && (
          <BienestarScreen onBack={() => setView({ screen: "categories" })} usuarioId={usuario.usuarioId} />
        )}

        {view.screen === "categories" && (
          <div className="fade-in">
            <EvidenceSummaryBar entradas={data.entradas} />
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 24, background: TOKENS.surface, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: "10px 14px" }}>
              <input
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="Buscar un alimento o combinación..."
                style={{ background: "transparent", border: "none", outline: "none", color: TOKENS.ink, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 14, width: "100%" }}
              />
            </div>
            <div style={{ display: "grid", gap: 10 }}>
              {filteredCats.map((cat) => (
                <button key={cat.name} onClick={() => setView({ screen: "category", name: cat.name })}
                  style={{ textAlign: "left", width: "100%", display: "flex", alignItems: "center", gap: 14, background: TOKENS.surface, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: "16px 20px", cursor: "pointer" }}>
                  <CategoryIcon name={cat.name} />
                  <span style={{ flex: 1 }}>
                    <span style={{ display: "block", fontFamily: "'Libre Franklin', sans-serif", fontSize: 17, fontWeight: 700, color: TOKENS.ink, letterSpacing: "-0.01em" }}>{cat.name}</span>
                    <span style={{ display: "block", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: TOKENS.inkDim, marginTop: 4 }}>
                      {cat.entries.length} {cat.entries.length === 1 ? "entrada" : "entradas"}
                    </span>
                  </span>
                </button>
              ))}
            </div>
          </div>
        )}

        {view.screen === "log" && (
          <LogMealScreen onBack={() => setView({ screen: "categories" })} usuarioId={usuario.usuarioId} />
        )}

        {view.screen === "category" && (() => {
          const cat = grupos[view.name] || [];
          return (
            <div className="fade-in">
              <button onClick={() => setView({ screen: "categories" })} style={{ background: "none", border: "none", color: TOKENS.inkDim, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 13, marginBottom: 20, cursor: "pointer", padding: 0 }}>
                ← Categorías
              </button>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
                <CategoryIcon name={view.name} />
                <h2 style={{ fontFamily: "'Libre Franklin', sans-serif", fontWeight: 700, fontSize: 22, color: TOKENS.ink, letterSpacing: "-0.01em", margin: 0 }}>{view.name}</h2>
              </div>
              <div style={{ display: "grid", gap: 10 }}>
                {cat.map((entry) => (
                  <button key={entry.id} onClick={() => setView({ screen: "entry", id: entry.id, catName: view.name })}
                    style={{ textAlign: "left", width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, background: TOKENS.surface, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: 16, cursor: "pointer" }}>
                    <span style={{ color: TOKENS.ink, fontSize: 14 }}>{entry.combinacion}</span>
                    <EvidenceStamp level={entry.evidencia} />
                  </button>
                ))}
              </div>
            </div>
          );
        })()}

        {view.screen === "entry" && (() => {
          const cat = grupos[view.catName] || [];
          const entry = cat.find((e) => e.id === view.id);
          if (!entry) return null;
          return (
            <div className="fade-in">
              <button onClick={() => setView({ screen: "category", name: view.catName })} style={{ background: "none", border: "none", color: TOKENS.inkDim, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 13, marginBottom: 24, cursor: "pointer", padding: 0 }}>
                ← Volver
              </button>
              <h2 style={{ fontFamily: "'Libre Franklin', sans-serif", fontWeight: 800, fontSize: 25, color: TOKENS.ink, lineHeight: 1.2, marginBottom: 14, letterSpacing: "-0.01em" }}>{entry.combinacion}</h2>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
                <EvidenceStamp level={entry.evidencia} />
                {entry.mecanismo && <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: TOKENS.inkDim }}>{entry.mecanismo}</span>}
              </div>
              <div style={{ borderTop: `1px solid ${TOKENS.border}`, paddingTop: 18 }}>
                <p style={{ color: TOKENS.inkDim, fontSize: 14, lineHeight: 1.65 }}>{entry.resultado}</p>
              </div>
              {entry.frecuencia && (
                <div style={{ borderTop: `1px solid ${TOKENS.border}`, paddingTop: 18, marginTop: 18 }}>
                  <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: TOKENS.primary, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>Frecuencia</p>
                  <p style={{ color: TOKENS.ink, fontSize: 14 }}>{entry.frecuencia}</p>
                </div>
              )}
            </div>
          );
        })()}

        <footer style={{ marginTop: 40, paddingTop: 16, borderTop: `1px solid ${TOKENS.border}`, textAlign: "center" }}>
          <a href="privacidad.html" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: TOKENS.inkDim, textDecoration: "none" }}>
            Política de privacidad
          </a>
          <span style={{ margin: "0 8px", color: TOKENS.border }}>·</span>
          <button
            onClick={() => { localStorage.removeItem("reseteo_usuario"); setUsuario(null); }}
            style={{ background: "none", border: "none", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: TOKENS.inkDim, cursor: "pointer", padding: 0 }}
          >
            Cerrar sesión ({usuario.email})
          </button>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(ErrorBoundary, null, React.createElement(App)));
document.getElementById("diagnostico").style.display = "none";

</script>

(function () {
  try {
    var source = document.getElementById("app-source").textContent;
    var output = Babel.transform(source, { presets: ["react"] }).code;
    var run = new Function("React", "ReactDOM", output);
    run(React, ReactDOM);
  } catch (err) {

</body>
</html>
