<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reseteo Propio — Explorador por problemática</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; }
  body { margin: 0; background: #FAFBFC; font-family: 'IBM Plex Sans', sans-serif; color: #101826; }
  #diagnostico { padding: 20px; font-family: monospace; font-size: 13px; white-space: pre-wrap; word-break: break-word; color: #101826; }
  ::selection { background: #1F4B6E; color: #FFFFFF; }
  @media (prefers-reduced-motion: no-preference) {
    .fade-in { animation: fadeIn 0.35s ease-out; }
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: 2px solid #1F4B6E; outline-offset: 2px;
  }
</style>
</head>
<body>
<div id="diagnostico">Cargando la app...</div>
<div id="root"></div>

<script>
  window.onerror = function (msg, url, line, col, error) {
    document.getElementById("diagnostico").innerText =
      "ERROR DETECTADO:\n" + msg + "\nLínea: " + line +
      "\n\nMandale esta captura a Claude para que lo resuelva.";
    return false;
  };
</script>

<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js" onerror="document.getElementById('diagnostico').innerText='No pudo cargar React desde jsdelivr. Puede ser un bloqueo de red.'"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js" onerror="document.getElementById('diagnostico').innerText='No pudo cargar React-DOM desde jsdelivr. Puede ser un bloqueo de red.'"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js" onerror="document.getElementById('diagnostico').innerText='No pudo cargar Babel desde jsdelivr. Puede ser un bloqueo de red.'"></script>

<script type="text/babel" data-presets="react">
document.getElementById("diagnostico").innerText = "Librerías cargadas, iniciando la app...";

const { useState, useEffect } = React;

const TOKENS = {
  bg: "#FAFBFC", surface: "#FFFFFF", border: "#E2E6EB", borderStrong: "#C7CDD5",
  ink: "#101826", inkDim: "#5B6472",
  primary: "#1F4B6E", primarySoft: "#EAF0F5",
  alto: "#2F6F62", medio: "#9C7A2E", especulativo: "#7D8590",
};

const EVIDENCE_STYLES = {
  Alto: { color: TOKENS.alto, label: "Evidencia alta" },
  Medio: { color: TOKENS.medio, label: "Evidencia media" },
  Especulativo: { color: TOKENS.especulativo, label: "Especulativo" },
};

function EvidenceStamp({ level }) {
  if (!level) return null;
  const style = EVIDENCE_STYLES[level] || { color: TOKENS.inkDim, label: level };
  return (
    <div style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      background: style.color + "14", borderRadius: 999,
      padding: "4px 10px 4px 8px", whiteSpace: "nowrap",
    }}>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: style.color, flexShrink: 0 }} />
      <span style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: "10.5px",
        letterSpacing: "0.03em", color: style.color, fontWeight: 500,
      }}>{style.label}</span>
    </div>
  );
}

function groupByCategoria(entradas) {
  const grupos = {};
  entradas.forEach((e) => {
    let claves = e.categorias && e.categorias.length ? e.categorias : null;
    if (!claves) {
      claves = [e.tipo === "protocolo" ? "Hábitos y Rutinas" : "Sin categorizar (pendiente)"];
    }
    claves.forEach((cat) => {
      if (!grupos[cat]) grupos[cat] = [];
      grupos[cat].push(e);
    });
  });
  return grupos;
}

function LogMealScreen({ onBack }) {
  const [texto, setTexto] = useState("");
  const [momento, setMomento] = useState("");
  const [enviando, setEnviando] = useState(false);
  const [resultado, setResultado] = useState(null);
  const [error, setError] = useState(null);

  const enviar = async () => {
    if (!texto.trim()) return;
    setEnviando(true);
    setError(null);
    try {
      const resp = await fetch("/api/registrar-comida", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto, momento: momento || undefined }),
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      setResultado(data);
    } catch (e) {
      setError(String(e.message || e));
    } finally {
      setEnviando(false);
    }
  };

  if (resultado) {
    return (
      <div className="fade-in">
        <button onClick={onBack} style={{ background: "none", border: "none", color: TOKENS.inkDim, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 13, marginBottom: 20, cursor: "pointer", padding: 0 }}>
          ← Categorías
        </button>
        <h2 style={{ fontFamily: "'Libre Franklin', sans-serif", fontWeight: 700, fontSize: 21, color: TOKENS.ink, marginBottom: 16, letterSpacing: "-0.01em" }}>
          {resultado.bloqueos.length === 0 ? "Sin bloqueos detectados" : `${resultado.bloqueos.length} bloqueo${resultado.bloqueos.length > 1 ? "s" : ""} detectado${resultado.bloqueos.length > 1 ? "s" : ""}`}
        </h2>
        {resultado.bloqueos.length === 0 && (
          <p style={{ color: TOKENS.inkDim, fontSize: 14, lineHeight: 1.6 }}>No encontramos combinaciones conflictivas conocidas en lo que registraste. Igual quedó guardado en tu historial.</p>
        )}
        <div style={{ display: "grid", gap: 12 }}>
          {resultado.bloqueos.map((b, i) => (
            <div key={i} style={{ background: TOKENS.surface, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: 18 }}>
              <p style={{ color: TOKENS.ink, fontSize: 15, fontWeight: 600, marginBottom: 8 }}>{b.combinacion}</p>
              <p style={{ color: TOKENS.inkDim, fontSize: 13, lineHeight: 1.6, marginBottom: b.solucion ? 12 : 0 }}>{b.resultado}</p>
              {b.solucion && (
                <div style={{ borderTop: `1px solid ${TOKENS.border}`, paddingTop: 12 }}>
                  <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: TOKENS.primary, marginBottom: 4, letterSpacing: "0.05em", textTransform: "uppercase" }}>Solución</p>
                  <p style={{ color: TOKENS.ink, fontSize: 13, lineHeight: 1.6 }}>{b.solucion.adaptacion}</p>
                </div>
              )}
            </div>
          ))}
        </div>
        <button onClick={() => { setResultado(null); setTexto(""); setMomento(""); }}
          style={{ marginTop: 20, width: "100%", background: TOKENS.primary, border: "none", borderRadius: 8, padding: "13px", color: "#FFFFFF", fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
          Registrar otra comida
        </button>
      </div>
    );
  }

  return (
    <div className="fade-in">
      <button onClick={onBack} style={{ background: "none", border: "none", color: TOKENS.inkDim, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 13, marginBottom: 20, cursor: "pointer", padding: 0 }}>
        ← Categorías
      </button>
      <h2 style={{ fontFamily: "'Libre Franklin', sans-serif", fontWeight: 700, fontSize: 23, color: TOKENS.ink, marginBottom: 8, letterSpacing: "-0.01em" }}>
        Cargar comida
      </h2>
      <p style={{ color: TOKENS.inkDim, fontSize: 13, marginBottom: 20, lineHeight: 1.5 }}>
        Contanos qué comiste, en tus palabras. Buscamos combinaciones conocidas automáticamente.
      </p>
      <textarea
        value={texto}
        onChange={(e) => setTexto(e.target.value)}
        placeholder="Ej: fideos con salsa de carne y queso rallado"
        rows={4}
        style={{ width: "100%", background: TOKENS.surface, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: 14, color: TOKENS.ink, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 14, marginBottom: 14, resize: "vertical" }}
      />
      <select
        value={momento}
        onChange={(e) => setMomento(e.target.value)}
        style={{ width: "100%", background: TOKENS.surface, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: 12, color: TOKENS.ink, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 14, marginBottom: 16 }}
      >
        <option value="">Momento del día (opcional)</option>
        <option value="Desayuno">Desayuno</option>
        <option value="Almuerzo">Almuerzo</option>
        <option value="Cena">Cena</option>
        <option value="Snack">Snack</option>
      </select>
      {error && <p style={{ color: "#B3453D", fontSize: 13, marginBottom: 12 }}>{error}</p>}
      <button onClick={enviar} disabled={enviando || !texto.trim()}
        style={{ width: "100%", background: enviando || !texto.trim() ? TOKENS.borderStrong : TOKENS.primary, border: "none", borderRadius: 8, padding: "13px", color: "#FFFFFF", fontWeight: 600, fontSize: 14, cursor: enviando ? "default" : "pointer" }}>
        {enviando ? "Buscando bloqueos..." : "Registrar comida"}
      </button>
    </div>
  );
}

function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [view, setView] = useState({ screen: "categories" });
  const [query, setQuery] = useState("");

  useEffect(() => {
    fetch("/api/data")
      .then((r) => r.json())
      .then((json) => {
        if (json.error) { setError(json.error); return; }
        setData(json);
      })
      .catch((e) => setError(String(e)));
  }, []);

  if (error) {
    return (
      <div style={{ padding: 24, color: TOKENS.ink, fontFamily: "'IBM Plex Sans', sans-serif" }}>
        <p style={{ color: "#B3453D" }}>Error cargando datos: {error}</p>
        <p style={{ color: TOKENS.inkDim, fontSize: 13 }}>
          Revisá que la variable de entorno AIRTABLE_API_KEY esté configurada en Vercel.
        </p>
      </div>
    );
  }

  if (!data) {
    return <div style={{ padding: 24, color: TOKENS.inkDim, fontFamily: "'IBM Plex Sans', sans-serif" }}>Cargando...</div>;
  }

  const grupos = groupByCategoria(data.entradas);
  const categorias = Object.keys(grupos).sort();

  const filteredCats = categorias
    .map((cat) => ({
      name: cat,
      entries: grupos[cat].filter((e) => e.combinacion.toLowerCase().includes(query.toLowerCase())),
    }))
    .filter((c) => query === "" || c.entries.length > 0);

  return (
    <div style={{ minHeight: "100vh", background: TOKENS.bg }}>
      <div style={{ maxWidth: 640, margin: "0 auto", padding: "28px 20px 60px" }}>
        <header style={{ marginBottom: 28, display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
          <div>
            <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: TOKENS.primary, letterSpacing: "0.08em", marginBottom: 6, textTransform: "uppercase" }}>
              Comida real · Dato verificable · Sincronizado {new Date(data.actualizado).toLocaleString("es-AR")}
            </p>
            <h1 style={{ fontFamily: "'Libre Franklin', sans-serif", fontWeight: 800, fontSize: 28, color: TOKENS.ink, lineHeight: 1.15, letterSpacing: "-0.02em", margin: 0 }}>
              Explorador por problemática
            </h1>
          </div>
          {view.screen === "categories" && (
            <button onClick={() => setView({ screen: "log" })}
              style={{ background: TOKENS.primary, border: "none", borderRadius: 8, padding: "10px 14px", color: "#FFFFFF", fontWeight: 600, fontSize: 12, whiteSpace: "nowrap", cursor: "pointer", flexShrink: 0 }}>
              + Cargar comida
            </button>
          )}
        </header>

        {view.screen === "categories" && (
          <div className="fade-in">
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 24, background: TOKENS.surface, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: "10px 14px" }}>
              <input
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="Buscar un alimento o combinación..."
                style={{ background: "transparent", border: "none", outline: "none", color: TOKENS.ink, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 14, width: "100%" }}
              />
            </div>
            <div style={{ display: "grid", gap: 10 }}>
              {filteredCats.map((cat) => (
                <button key={cat.name} onClick={() => setView({ screen: "category", name: cat.name })}
                  style={{ textAlign: "left", width: "100%", background: TOKENS.surface, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: "18px 20px", cursor: "pointer" }}>
                  <span style={{ fontFamily: "'Libre Franklin', sans-serif", fontSize: 17, fontWeight: 700, color: TOKENS.ink, letterSpacing: "-0.01em" }}>{cat.name}</span>
                  <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: TOKENS.inkDim, marginTop: 6, marginBottom: 0 }}>
                    {cat.entries.length} {cat.entries.length === 1 ? "entrada" : "entradas"}
                  </p>
                </button>
              ))}
            </div>
          </div>
        )}

        {view.screen === "log" && (
          <LogMealScreen onBack={() => setView({ screen: "categories" })} />
        )}

        {view.screen === "category" && (() => {
          const cat = grupos[view.name] || [];
          return (
            <div className="fade-in">
              <button onClick={() => setView({ screen: "categories" })} style={{ background: "none", border: "none", color: TOKENS.inkDim, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 13, marginBottom: 20, cursor: "pointer", padding: 0 }}>
                ← Categorías
              </button>
              <h2 style={{ fontFamily: "'Libre Franklin', sans-serif", fontWeight: 700, fontSize: 22, color: TOKENS.ink, marginBottom: 20, letterSpacing: "-0.01em" }}>{view.name}</h2>
              <div style={{ display: "grid", gap: 10 }}>
                {cat.map((entry) => (
                  <button key={entry.id} onClick={() => setView({ screen: "entry", id: entry.id, catName: view.name })}
                    style={{ textAlign: "left", width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, background: TOKENS.surface, border: `1px solid ${TOKENS.border}`, borderRadius: 8, padding: 16, cursor: "pointer" }}>
                    <span style={{ color: TOKENS.ink, fontSize: 14 }}>{entry.combinacion}</span>
                    <EvidenceStamp level={entry.evidencia} />
                  </button>
                ))}
              </div>
            </div>
          );
        })()}

        {view.screen === "entry" && (() => {
          const cat = grupos[view.catName] || [];
          const entry = cat.find((e) => e.id === view.id);
          if (!entry) return null;
          return (
            <div className="fade-in">
              <button onClick={() => setView({ screen: "category", name: view.catName })} style={{ background: "none", border: "none", color: TOKENS.inkDim, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 13, marginBottom: 24, cursor: "pointer", padding: 0 }}>
                ← Volver
              </button>
              <h2 style={{ fontFamily: "'Libre Franklin', sans-serif", fontWeight: 800, fontSize: 25, color: TOKENS.ink, lineHeight: 1.2, marginBottom: 14, letterSpacing: "-0.01em" }}>{entry.combinacion}</h2>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
                <EvidenceStamp level={entry.evidencia} />
                {entry.mecanismo && <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: TOKENS.inkDim }}>{entry.mecanismo}</span>}
              </div>
              <div style={{ borderTop: `1px solid ${TOKENS.border}`, paddingTop: 18 }}>
                <p style={{ color: TOKENS.inkDim, fontSize: 14, lineHeight: 1.65 }}>{entry.resultado}</p>
              </div>
              {entry.frecuencia && (
                <div style={{ borderTop: `1px solid ${TOKENS.border}`, paddingTop: 18, marginTop: 18 }}>
                  <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: TOKENS.primary, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>Frecuencia</p>
                  <p style={{ color: TOKENS.ink, fontSize: 14 }}>{entry.frecuencia}</p>
                </div>
              )}
            </div>
          );
        })()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
document.getElementById("diagnostico").style.display = "none";

</script>
</body>
</html>
